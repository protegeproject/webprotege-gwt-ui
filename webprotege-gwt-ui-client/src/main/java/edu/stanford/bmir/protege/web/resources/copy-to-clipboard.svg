<svg xmlns="http://www.w3.org/2000/svg"
     width="24" height="24" viewBox="0 0 24 24">

  <defs>
    <mask id="topPageMask" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="24" height="24" fill="white"/>
      <rect x="8" y="7" width="12" height="16" rx="2" ry="2" fill="black"/>
    </mask>
  </defs>

  <!-- Bottom page -->
  <rect x="4" y="3" width="12" height="16" rx="2" ry="2"
        fill="none" stroke="currentColor" stroke-width="2"
        mask="url(#topPageMask)"/>

  <!-- Top page -->
  <rect x="8" y="7" width="12" height="16" rx="2" ry="2"
        fill="none" stroke="currentColor" stroke-width="2"/>
</svg>



